<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Farm Bots — floating island reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #6d8ea8; }
  #c { position: fixed; inset: 0; display: block; }
  .badge { position: fixed; top: 16px; left: 16px; z-index: 5;
    background: rgba(19,22,31,0.82); color: #f1f3f7; padding: 8px 14px; border-radius: 10px;
    font-size: 15px; letter-spacing: .5px; font-family: "Pixelify Sans", system-ui, sans-serif;
    border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(4px); }
  .badge small { display:block; font-size: 11px; color:#9aa6b4; letter-spacing:1px; text-transform:uppercase; }
  #loading { position: fixed; inset: 0; display: grid; place-items: center; z-index: 6;
    color: #20364a; font-size: 18px; letter-spacing: 1px; transition: opacity .6s; pointer-events:none;
    font-family: "Pixelify Sans", system-ui, sans-serif; }
  .hint { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index:5;
    color: rgba(20,40,56,0.6); font-size: 12px; letter-spacing: 1px; font-family: "Pixelify Sans", system-ui, sans-serif; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="badge">Floating Island<small>tilt-shift · GTAO · bloom · wind · panda</small></div>
<div id="loading">building island…</div>
<div class="hint">drag to orbit · scroll to zoom</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { GTAOPass } from "three/addons/postprocessing/GTAOPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
// custom tilt-shift shader is defined inline below
import { ShaderPass } from "three/addons/postprocessing/ShaderPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

const rand = (a, b) => a + Math.random() * (b - a);

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.02;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x8aa6bd, 32, 72);
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
scene.environmentIntensity = 0.3;

// GLSL gradient sky dome
const sky = new THREE.Mesh(new THREE.SphereGeometry(60, 32, 16), new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    top: { value: new THREE.Color(0xaecfe2) }, mid: { value: new THREE.Color(0x8fafc6) }, bottom: { value: new THREE.Color(0x9c8f7a) },
    sunDir: { value: new THREE.Vector3(0, 1, 0) }, sunCol: { value: new THREE.Color(0xffd9a0) }, sunGlow: { value: 1.0 },
  },
  vertexShader: `varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    varying vec3 vP; uniform vec3 top,mid,bottom,sunDir,sunCol; uniform float sunGlow;
    void main(){
      vec3 dir = normalize(vP);
      float h = dir.y * 0.5 + 0.5;
      vec3 c = h > 0.5 ? mix(mid, top, (h - 0.5) * 2.0) : mix(bottom, mid, h * 2.0);
      float a = max(dot(dir, sunDir), 0.0);
      c += sunCol * (pow(a, 110.0) * 0.5 + pow(a, 7.0) * 0.1) * sunGlow;  // atmospheric sun glow (gentler at noon)
      gl_FragColor = vec4(c, 1.0);
    }`,
}));
scene.add(sky);

// sun + moon discs (bright → catch bloom) and a star field for the night
// SUN: bright core + soft halo + wide corona (bloom turns it into a glowing sun)
const sun3 = new THREE.Group();
const sunCore = new THREE.Mesh(new THREE.SphereGeometry(4.4, 40, 30), new THREE.MeshBasicMaterial({ color: 0xffe7a6, fog: false, transparent: true }));
const sunHalo = new THREE.Mesh(new THREE.SphereGeometry(8.5, 40, 30), new THREE.MeshBasicMaterial({ color: 0xffc878, fog: false, transparent: true, opacity: 0.28, blending: THREE.AdditiveBlending, depthWrite: false }));
const sunCorona = new THREE.Mesh(new THREE.SphereGeometry(15.0, 40, 30), new THREE.MeshBasicMaterial({ color: 0xff9a48, fog: false, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending, depthWrite: false }));
sun3.add(sunCore, sunHalo, sunCorona); scene.add(sun3);
// MOON: pale body + maria + many craters + faint halo
const moon3 = new THREE.Group();
const moonBody = new THREE.Mesh(new THREE.SphereGeometry(3.6, 40, 30), new THREE.MeshBasicMaterial({ color: 0xe4ebf6, fog: false, transparent: true }));
moon3.add(moonBody);
const maria = new THREE.Mesh(new THREE.SphereGeometry(1.2, 18, 14), new THREE.MeshBasicMaterial({ color: 0xc6cfe0, fog: false, transparent: true }));
maria.position.set(0.9, 0.6, 3.0); maria.scale.set(1.3, 1.0, 0.25); moon3.add(maria);
for (let i = 0; i < 11; i++) { const cr = new THREE.Mesh(new THREE.SphereGeometry(rand(0.25, 0.6), 14, 12), new THREE.MeshBasicMaterial({ color: 0xbcc6da, fog: false, transparent: true })); cr.position.copy(new THREE.Vector3().randomDirection().multiplyScalar(3.45)); cr.scale.z = 0.35; cr.lookAt(0, 0, 0); moon3.add(cr); }
const moonHalo = new THREE.Mesh(new THREE.SphereGeometry(6.0, 40, 30), new THREE.MeshBasicMaterial({ color: 0xc6cfe8, fog: false, transparent: true, opacity: 0.22, blending: THREE.AdditiveBlending, depthWrite: false }));
moon3.add(moonHalo); scene.add(moon3);
const starGeo = new THREE.BufferGeometry();
const STAR_N = 320, sarr = new Float32Array(STAR_N * 3);
for (let i = 0; i < STAR_N; i++) { const v = new THREE.Vector3().randomDirection().multiplyScalar(54); sarr[i * 3] = v.x; sarr[i * 3 + 1] = Math.abs(v.y) * 0.8 + 4; sarr[i * 3 + 2] = v.z; }
starGeo.setAttribute("position", new THREE.BufferAttribute(sarr, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.32, transparent: true, opacity: 0, depthWrite: false, fog: false }));
scene.add(stars);

const camera = new THREE.PerspectiveCamera(36, innerWidth / innerHeight, 0.1, 200);
camera.position.set(17, 13, 19);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true; controls.dampingFactor = 0.08; controls.enablePan = false;
controls.minDistance = 10; controls.maxDistance = 48; controls.minPolarAngle = 0.4; controls.maxPolarAngle = 1.35;
controls.autoRotate = true; controls.autoRotateSpeed = 0.45;

// ---------- lighting (driven by the day/night cycle) ----------
const hemi = new THREE.HemisphereLight(0xdce9f2, 0x6f5a38, 0.45);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffcf8a, 1.25);
sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
const sc = sun.shadow.camera; sc.left = -9; sc.right = 9; sc.top = 9; sc.bottom = -9;
sun.shadow.bias = -0.0004; sun.shadow.normalBias = 0.03;
scene.add(sun);

// day/night: orbit the sun, recolor sky + lights + fog, fade stars/moon
let nightFactor = 0, dayFactor = 0, sunsetFactor = 0;
const SKY = {
  dayTop: new THREE.Color(0xaecfe2), dayMid: new THREE.Color(0x8fafc6), dayBot: new THREE.Color(0xcbb892),
  setTop: new THREE.Color(0x3a2c64), setMid: new THREE.Color(0xcf5536), setBot: new THREE.Color(0xffa544),
  nightTop: new THREE.Color(0x080b18), nightMid: new THREE.Color(0x121830), nightBot: new THREE.Color(0x223052),
};
const sunDay = new THREE.Color(0xfff1d4), sunSet = new THREE.Color(0xff7a2e);
const hemiDaySky = new THREE.Color(0xdce9f2), hemiNightSky = new THREE.Color(0x1c2740);
const smooth = (a, b, x) => { const t = THREE.MathUtils.clamp((x - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); };
const _c = new THREE.Color();
function setDayNight(d) {
  const ang = d * Math.PI * 2;
  const e = Math.sin(ang);                       // sun elevation -1..1
  sun.position.set(Math.cos(ang) * 18, e * 16, 7);
  const dayF = smooth(-0.05, 0.32, e);           // 0 night .. 1 day
  const setF = THREE.MathUtils.clamp(1 - Math.abs(e) / 0.33, 0, 1) * smooth(-0.25, 0.05, e);
  nightFactor = 1 - dayF; dayFactor = dayF; sunsetFactor = setF;
  sun.intensity = smooth(-0.04, 0.28, e) * 1.4;
  sun.color.copy(sunDay).lerp(sunSet, setF * 0.85);
  hemi.intensity = THREE.MathUtils.lerp(0.26, 0.5, dayF);
  hemi.color.copy(hemiNightSky).lerp(hemiDaySky, dayF);
  scene.environmentIntensity = THREE.MathUtils.lerp(0.17, 0.32, dayF);
  renderer.toneMappingExposure = THREE.MathUtils.lerp(0.94, 1.05, dayF);
  for (const pl of nightLights) pl.intensity = nightFactor * 1.5;
  fireflies.material.opacity = nightFactor * 0.9;
  // sky gradient
  const u = sky.material.uniforms;
  u.top.value.copy(SKY.nightTop).lerp(SKY.dayTop, dayF).lerp(SKY.setTop, setF * 0.62);
  u.mid.value.copy(SKY.nightMid).lerp(SKY.dayMid, dayF).lerp(SKY.setMid, setF * 0.9);
  u.bottom.value.copy(SKY.nightBot).lerp(SKY.dayBot, dayF).lerp(SKY.setBot, setF * 0.96);
  scene.fog.color.copy(u.mid.value);
  // celestial discs
  const dir = sun.position.clone().normalize();
  sun3.position.copy(dir).multiplyScalar(52);
  const sop = smooth(-0.12, 0.05, e);
  sunCore.material.color.copy(_c.copy(sunDay).lerp(sunSet, setF));
  sunHalo.material.color.copy(sunCore.material.color);
  sunCore.material.opacity = sop; sunHalo.material.opacity = sop * (0.3 + setF * 0.3);
  sunCorona.material.color.copy(sunCore.material.color); sunCorona.material.opacity = sop * (0.12 + setF * 0.3);
  moon3.position.copy(dir).multiplyScalar(-52);
  for (const m of moon3.children) m.material.opacity = (1 - dayF) * (m === moonHalo ? 0.22 : 1);
  stars.material.opacity = (1 - dayF) * 0.9;
  // feed the sun into the sky-glow shader
  const su = sky.material.uniforms;
  su.sunDir.value.copy(dir); su.sunCol.value.copy(sunCore.material.color); su.sunGlow.value = smooth(-0.05, 0.3, e);
}

// ---------- post FX: GTAO + bloom + tilt-shift DOF + warm grade/vignette/grain ----------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const gtao = new GTAOPass(scene, camera, innerWidth, innerHeight);
try { gtao.updateGtaoMaterial({ radius: 0.5, scale: 1.1, samples: 16 }); } catch (e) {}
composer.addPass(gtao);
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.22, 0.55, 0.9));
// volumetric god-rays: radial light-scatter from the sun's screen position. Adds light only
// (samples bright sky/sun toward the sun), so it never blurs or darkens the island.
const GodRays = {
  uniforms: { tDiffuse: { value: null }, uSun: { value: new THREE.Vector2(0.5, 0.75) }, uIntensity: { value: 0.0 }, uDecay: { value: 0.95 }, uDensity: { value: 0.75 }, uWeight: { value: 0.4 } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader: `
    varying vec2 vUv; uniform sampler2D tDiffuse; uniform vec2 uSun; uniform float uIntensity,uDecay,uDensity,uWeight;
    const int N = 64;
    void main(){
      vec3 base = texture2D(tDiffuse, vUv).rgb;
      if (uIntensity <= 0.001) { gl_FragColor = vec4(base, 1.0); return; }
      vec2 delta = (vUv - uSun) * (uDensity / float(N));
      vec2 coord = vUv; float illum = 1.0; vec3 sum = vec3(0.0);
      for (int i = 0; i < N; i++) {
        coord -= delta;
        vec3 s = texture2D(tDiffuse, coord).rgb;
        float lum = max(max(s.r, s.g), s.b);
        s *= smoothstep(1.15, 2.6, lum);   // HDR threshold: ONLY the very-bright sun scatters (geometry/panda excluded)
        sum += s * illum * uWeight; illum *= uDecay;
      }
      gl_FragColor = vec4(base + sum * uIntensity, 1.0);
    }`,
};
const godrays = new ShaderPass(GodRays);
composer.addPass(godrays);
// screen-space tilt-shift (sharp horizontal band in the middle, blurred top/bottom).
// Depth-independent, so the centred island can never blur out, but the strong
// miniature blur on the edges is preserved.
// custom tilt-shift: a WIDE always-sharp centre band, blur ramps in only near the
// top/bottom edges, and the blur radius is capped — so the island (which lives in
// the middle of the frame) can never blur out, while the miniature edge blur stays strong.
const TiltBand = {
  uniforms: {
    tDiffuse: { value: null },
    uRes: { value: new THREE.Vector2(innerWidth, innerHeight) },
    uCenter: { value: 0.54 }, uBand: { value: 0.3 }, uFeather: { value: 0.22 }, uMax: { value: 6.0 },
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader: `
    varying vec2 vUv; uniform sampler2D tDiffuse; uniform vec2 uRes; uniform float uCenter,uBand,uFeather,uMax;
    void main(){
      float d = abs(vUv.y - uCenter);
      float blur = smoothstep(uBand, uBand + uFeather, d);   // 0 in the sharp band .. 1 at edges
      float r = blur * uMax;
      if (r < 0.6) { gl_FragColor = texture2D(tDiffuse, vUv); return; }
      vec2 px = (1.0 / uRes) * r;
      vec4 sum = vec4(0.0); float wsum = 0.0;
      for (int i=-3;i<=3;i++) for (int j=-3;j<=3;j++) {
        vec2 o = vec2(float(i), float(j)) / 3.0;
        float w = 1.0 - length(o) * 0.5; if (w <= 0.0) continue;
        sum += texture2D(tDiffuse, vUv + o * px) * w; wsum += w;
      }
      gl_FragColor = sum / wsum;
    }`,
};
const tilt = new ShaderPass(TiltBand);
composer.addPass(tilt);
composer.addPass(new OutputPass());
const GradeShader = {
  uniforms: { tDiffuse: { value: null }, uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader: `
    varying vec2 vUv; uniform sampler2D tDiffuse; uniform float uTime;
    float rnd(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
    void main(){
      vec3 c = texture2D(tDiffuse, vUv).rgb;
      c.r += 0.05; c.b -= 0.025; c = clamp(c, 0.0, 1.0);     // warm grade
      float l = dot(c, vec3(0.299,0.587,0.114));
      c = mix(vec3(l), c, 1.13);                              // pop saturation
      float d = distance(vUv, vec2(0.5, 0.46));
      c *= smoothstep(0.92, 0.32, d);                         // vignette
      c += (rnd(vUv * 1024.0 + uTime) - 0.5) * 0.05;          // film grain
      gl_FragColor = vec4(c, 1.0);
    }`,
};
const gradePass = new ShaderPass(GradeShader);
composer.addPass(gradePass);

function resize() {
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
  gtao.setSize(innerWidth, innerHeight);
  tilt.uniforms.uRes.value.set(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
}
addEventListener("resize", resize); resize();

// ---------- island ----------
const island = new THREE.Group(); scene.add(island);
const swayers = [];
const COLS = 9, ROWS = 9, STEP = 1.0, TILE = 0.96, TH = 0.5;
const SCAR_C = (COLS / 2) | 0, SCAR_R = (ROWS / 2) | 0; // scarecrow's grass tile (centre)
const half = (n) => (n - 1) / 2;
const grassShades = [0x6e9d4a, 0x668f43, 0x77a652, 0x5f8a3e];
const matDirt = new THREE.MeshStandardMaterial({ color: 0x5c3c23, roughness: 1, metalness: 0, flatShading: true });
const matSoil = new THREE.MeshStandardMaterial({ color: 0x73482a, roughness: 1, metalness: 0, flatShading: true });
const matSoilDark = new THREE.MeshStandardMaterial({ color: 0x5e3a22, roughness: 1, metalness: 0, flatShading: true });
const matRock = new THREE.MeshStandardMaterial({ color: 0x6a5740, roughness: 1, metalness: 0, flatShading: true });
const isSoil = () => true; // entire island surface is farmland

// island = a grid of short soil slabs; tops hoed into tilled farmland. Per-tile colour
// variety (random dirt/soil shades + dark patches) gives texture without image maps.
const H = 0.62; // short slab
const sideShades = [0x8a5a34, 0x805231, 0x946239, 0x7a4d2c, 0x8f5d36];
const topShades = [0x6e4a28, 0x664424, 0x744e2c, 0x5e3f22, 0x6b4826];
const ridgeShades = [0x8a6038, 0x956840, 0x815a34, 0x8f6440];
const grassTop = new THREE.MeshStandardMaterial({ color: 0x6f9d49, roughness: 1, metalness: 0, flatShading: true });
const patchMat = new THREE.MeshStandardMaterial({ color: 0x4f351d, roughness: 1, metalness: 0, flatShading: true });
const pick = (a) => a[(Math.random() * a.length) | 0];
const mat = (color) => new THREE.MeshStandardMaterial({ color, roughness: 1, metalness: 0, flatShading: true });
for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
  const wx = (c - half(COLS)) * STEP, wz = (r - half(ROWS)) * STEP;
  const isScare = c === SCAR_C && r === SCAR_R;
  const side = mat(pick(sideShades));
  const block = new THREE.Mesh(new THREE.BoxGeometry(TILE, H, TILE), [side, side, isScare ? grassTop : mat(pick(topShades)), side, side, side]);
  block.position.set(wx, -H / 2, wz); block.castShadow = true; block.receiveShadow = true; island.add(block);
  if (isScare) continue; // grass tile under the scarecrow — no furrows / no crops
  const along = (c + r) % 2 === 0; const ridgeMat = mat(pick(ridgeShades));
  for (let k = -2; k <= 2; k++) {
    const fr = new THREE.Mesh(new THREE.BoxGeometry(along ? TILE * 0.92 : 0.11, 0.05, along ? 0.11 : TILE * 0.92), ridgeMat);
    if (along) fr.position.set(wx, 0.02, wz + k * 0.18); else fr.position.set(wx + k * 0.18, 0.02, wz);
    fr.castShadow = true; fr.receiveShadow = true; island.add(fr);
  }
  if (Math.random() < 0.5) { const patch = new THREE.Mesh(new THREE.BoxGeometry(rand(0.12, 0.26), 0.02, rand(0.12, 0.26)), patchMat); patch.position.set(wx + rand(-0.3, 0.3), 0.045, wz + rand(-0.3, 0.3)); patch.receiveShadow = true; island.add(patch); }
}
// little nub feet under the rim (reference underside)
for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
  const edge = r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1;
  if (!edge || Math.random() < 0.45) continue;
  const wx = (c - half(COLS)) * STEP, wz = (r - half(ROWS)) * STEP;
  const nub = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.16, 0.18), mat(pick(sideShades)));
  nub.position.set(wx + rand(-0.16, 0.16), -H - 0.05, wz + rand(-0.16, 0.16)); nub.castShadow = true; island.add(nub);
}

// ---------- crops (GLTF) with wind sway ----------
const loader = new GLTFLoader();
const tileWorld = (c, r) => new THREE.Vector3((c - half(COLS)) * STEP, 0.02, (r - half(ROWS)) * STEP);
function prep(root, targetH) {
  root.traverse((o) => { if (!o.isMesh) return; o.castShadow = true; o.receiveShadow = true; const mats = Array.isArray(o.material) ? o.material : [o.material]; for (const m of mats) { if (!m) continue; m.metalness = 0; m.roughness = 0.95; m.envMapIntensity = 0.22; m.needsUpdate = true; } });
  const b = new THREE.Box3().setFromObject(root), s = new THREE.Vector3(); b.getSize(s); root.scale.setScalar(targetH / (s.y || 1));
  const b2 = new THREE.Box3().setFromObject(root), c = new THREE.Vector3(); b2.getCenter(c); root.position.x -= c.x; root.position.z -= c.z; root.position.y -= b2.min.y; return root;
}
const load = (u, h) => new Promise((res) => loader.load(u, (g) => res(prep(g.scene, h)), undefined, () => res(null)));

Promise.all([load("/models/wheat.glb", 0.8)])
.then(([wheat]) => {
  const place = (model, c, r, o = {}, amp = 0.1) => {
    if (!model) return; const m = model.clone(true); const p = tileWorld(c, r);
    m.position.copy(p); m.position.x += o.dx ?? 0; m.position.z += o.dz ?? 0;
    m.rotation.y = o.rotY ?? Math.random() * Math.PI * 2; if (o.scale) m.scale.multiplyScalar(o.scale);
    island.add(m); swayers.push({ o: m, phase: Math.random() * 6.28, amp });
  };
  // fill each bed edge-to-edge on a sub-grid; inset keeps crops inside the tile (no overlap with neighbours)
  const fillTile = (model, c, r, grid, amp) => {
    const inset = TILE / 2 - 0.13;
    for (let i = 0; i < grid; i++) for (let j = 0; j < grid; j++) {
      const fx = grid === 1 ? 0 : (i / (grid - 1) - 0.5) * 2 * inset;
      const fz = grid === 1 ? 0 : (j / (grid - 1) - 0.5) * 2 * inset;
      place(model, c, r, { dx: fx + rand(-0.03, 0.03), dz: fz + rand(-0.03, 0.03), scale: rand(0.92, 1.12) }, amp);
    }
  };
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { if (c === SCAR_C && r === SCAR_R) continue; fillTile(wheat, c, r, 3, 0.14); }
  document.getElementById("loading").style.opacity = "0";
});

// ---------- flying panda with wings + straw hat ----------
function buildPanda() {
  const g = new THREE.Group();

  pa.needsUpdate = true;
  const fa = fireflies.geometry.attributes.position;
  for (let i = 0; i < FF; i++) { fa.setX(i, fa.getX(i) + Math.sin(t * 0.6 + i) * dt * 0.12); fa.setY(i, fa.getY(i) + Math.cos(t * 0.5 + i * 1.3) * dt * 0.08); }
  fa.needsUpdate = true;
  fireflies.material.opacity = nightFactor * 0.9 * (0.55 + 0.45 * Math.sin(t * 3.2));

  // lantern flame flicker
  const L = scarecrow.userData.lantern;
  const flick = 0.78 + Math.sin(t * 11) * 0.13 + Math.sin(t * 23.7) * 0.06;
  L.glass.emissiveIntensity = (0.55 + nightFactor * 1.5) * flick;
  L.light.intensity = nightFactor * 1.7 * flick;
  L.flame.scale.set(1 + Math.sin(t * 17) * 0.12, 0.8 + Math.sin(t * 14) * 0.22, 1);

  // crows: mostly folded wings, occasional flap
  for (const cw of crows) { const f = Math.sin(t * 9 + cw.userData.ph); const a = 0.08 + Math.max(0, f) * 0.5; for (const wg of cw.userData.wings) wg.w.rotation.z = wg.sx * a; }

  // butterflies drift over the field by day
  for (const bf of butterflies) { const u = bf.userData; const a = t * u.sp + u.ph; bf.position.set(Math.cos(a) * u.rad, u.yb + Math.sin(t * 1.5 + u.ph) * 0.4, Math.sin(a) * u.rad); bf.rotation.y = -a; const fl = Math.sin(t * 16 + u.ph) * 0.9; for (const wg of u.wings) wg.w.rotation.y = wg.sx * (0.5 + fl); u.mat.opacity = dayFactor * 0.95; bf.visible = dayFactor > 0.05; }

  // shooting stars at night
  ssTimer += dt;
  if (nightFactor > 0.55 && ssTimer > 2.2 && Math.random() < 0.45) { ssTimer = 0; const m = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 6), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, fog: false })); m.position.set(rand(-22, 22), rand(14, 22), rand(-20, -6)); m.userData = { vel: new THREE.Vector3(rand(-7, -3), rand(-3.5, -1.5), rand(2, 6)), life: 0, max: rand(0.7, 1.3) }; scene.add(m); shootingStars.push(m); }
  for (let i = shootingStars.length - 1; i >= 0; i--) { const m = shootingStars[i]; m.userData.life += dt; m.position.addScaledVector(m.userData.vel, dt); m.material.opacity = 1 - m.userData.life / m.userData.max; m.scale.set(1, 1, 1 + (m.userData.life / m.userData.max) * 9); if (m.userData.life > m.userData.max) { scene.remove(m); shootingStars.splice(i, 1); } }

  gradePass.uniforms.uTime.value = t;
  // aim god-rays at the sun's screen position; fade with daylight, off when behind camera
  const sp = sun3.position.clone().project(camera);
  godrays.uniforms.uSun.value.set(sp.x * 0.5 + 0.5, sp.y * 0.5 + 0.5);
  godrays.uniforms.uIntensity.value = sp.z < 1 ? dayFactor * (0.12 + sunsetFactor * 0.95) : 0.0;
  controls.update();
  composer.render();
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
